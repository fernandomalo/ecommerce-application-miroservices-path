apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecomod-kafka-v1
  labels:
    app: ecomod-kafka
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecomod-kafka
      version: v1
  template:
    metadata:
      labels:
        app: ecomod-kafka
        version: v1
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          ports:
            - containerPort: 9092
          env:
            # Configuración de Roles (Broker y Controlador en el mismo pod)
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"

            # Listeners: Muy importante para Istio
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://ecomod-kafka:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

            # ID de Cluster: Requerido por la imagen oficial para iniciar KRaft
            - name: CLUSTER_ID
              value: "Mk3OEYBSD34fcwNTJENDM2Qk" # Puedes generar uno propio

            # Configuración de tópicos para un solo nodo
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artemis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artemis
  template:
    metadata:
      labels:
        app: artemis
    spec:
      containers:
        - name: artemis
          image: apache/activemq-artemis:latest
          ports:
            - containerPort: 8161 # Web Console
            - containerPort: 61616 # AMQP/OpenWire
          env:
            - name: ARTEMIS_USER
              value: admin
            - name: ARTEMIS_PASSWORD
              value: admin
            - name: ANONYMOUS_LOGIN
              value: "false"

---
apiVersion: v1
kind: Service
metadata:
  name: ecomod-kafka
spec:
  selector:
    app: ecomod-kafka
  ports:
    - name: tcp-kafka
      port: 9092
      targetPort: 9092

---
apiVersion: v1
kind: Service
metadata:
  name: artemis-service
spec:
  selector:
    app: artemis
  ports:
    - name: web-console
      port: 8161
      targetPort: 8161
    - name: amqp
      port: 61616
      targetPort: 61616
  type: ClusterIP
