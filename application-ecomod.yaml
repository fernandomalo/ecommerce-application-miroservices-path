---
apiVersion: v1
kind: Service
metadata:
  name: ecomod-auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8080
      targetPort: 8003
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ecomod-api-gateway
spec:
