---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: ecomod-ingressgateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "ecomod-colombia.shop"

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ecomod-virtualservice
spec:
  hosts:
    - "ecomod-colombia.shop"
  gateways:
    - ecomod-ingressgateway
  http:
    - match:
        - uri:
            prefix: /api
        - uri:
            prefix: /auth
      route:
        - destination:
            host: ecomod-api-gateway.default.svc.cluster.local
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: ecomod-frontend-service.default.svc.cluster.local
