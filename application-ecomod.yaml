apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-unit
spec:
  selector:
    matchLabels:
      app: auth-service
  replicas: 1
  template:
    metadata:
      labels:
        app: auth-service
        version: v1.0.0
    spec:
      containers:
        - name: auth-service
          image: fernando005708/ecomod-auth-service:1.0.0-SNAPSHOT
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/auth_db
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: MiClaveSegura123!
          imagePullPolicy: Always

